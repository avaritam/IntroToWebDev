    <title>JS Math Methods</title>
    <script>
      // declear a variable with a name and assign it a value
      var x = 15 // integer
      var y = 35 // integer
      var z// declear a variable but not assigning value immediately
      // we can assign a value at any time
      z = 10.5 // float

      // console.log to print
      // addition
      console.log(x + y)

      // subtraction
      console.log(x - y)

      // multiplication
      console.log(x * y)

      // division
      console.log(x / y)

      // modulus - returns the remainder of a division
      // this is rlly helpful when we want to use odd/even or every nth item
      console.log(10 % 3) // print 1
      console.log(11 % 3) // print 2
      console.log(12 % 3) // print 0

      // just like in algebra order of operations matters !
      console.log(x + y * y - 1)
      console.log((x + y) * (y - 1))

      // increment
      x++ // same as x = x +1

      // decrement
      x-- // same as x = x - 1 

      // increment by a certian number
      x += 2 // same as x = x + 2

      // decrement by a certain number
      x -= 3 // same as x = x - 3

      // floating point numbers and basic math functions
      var k = 2.75
      // Math.floor alwasy rounds down, Math.cel always rounds up regardless of the decimal number
      var kDown = Math.floor(k)
      var kUp = Math.ceil(k)

      // Math.round rounds up and down based on traditional decimal rules
      console.log(Math.round(k))

      // Math.random() returns a floating point number between 0 and 1
      console.log(Math.random())
      // we can use Math.random with Math.round to get the whole numbers 0 or 1
      // true false boolean
      var yn = Math.round(Math.random())
      console.log(yn)

      if (yn == 0){
        console.log("Lights OFF")
      } else {
        console.log("Lights ON!")
      }

      // random numer between 0 and num
      // we will need to make a function that takes a num paramete
      function randNum(num){
        // when we declare a variable inside of a function that variable is scoped
        var rn =Math.round(num * Math.random)
      }

      console.log(rn)

      randNum(80)

      // a function to return a random number within a range, that means we need a min and a maxparamete
      function randNumRange(min, max){
        var rn = Math.round(Math.random() * (max - min) + min)
        return rn
      }
