<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Only Modal</title>
    <!-- Internal Stylesheet -->
    <style type="text/css">
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      /* Anchor tags that look like buttons */
      a.button {
        text-decoration: none;
        color: white;
        background-color: violet;
        padding: 1rem 2rem;
        border-radius: 0.75rem;
        display: inline-block;
      }

      /* Modal Styles */
      .info_modal {
        /* Stretch the div to cover the entire screen */
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        /* Transparent gray background */
        background-color: rgba(0,0,0,0.3);
        /* Make sure overlay is above other elements on screen */
        z-index: 99999;
        /* Invisible by default */
        opacity: 0;
        /* We always define the transition on the starting state */
        transition: opacity 400ms ease-in;
        /* Make sure we can't click anything behind our overlay */
        pointer-events: none;
      }

      /* This selector drags only the targeted id from our anchor tag click events */
      .info_modal:target {
        opacity: 1;
        /* Re-allow pointer events */
        pointer-events: auto;
      }

      .center {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* This will select only direct descendant divs of something with the class info modal */
      .info_modal > div {
        background-color: white;
        width: 600px;
        height: 600px;
        padding: 2rem;
        border-radius: 0.75rem;
        position: relative;
      }

      .close {
        height: 20px;
        width: 20px;
        background-color: antiquewhite;
        /* Position it in the top right corner */
        position: absolute;
        top: 0;
        right: 0;

      }


    </style>
  </head>
  <body>
    <!-- Anchor tags that target another element on hte page with a specific id -->
    <!-- Anchor tags with a class to make them look like a button-->
    <a href="#info" class="button">Open Modal 1</a>
    <a href="#info_2" class="button">Open Modal 2</a>
    <!-- NEW Modal/Button = NEW Target -->

    <!-- BEGIN MODAL 1 -->
    <!-- parent wrapper div with !D that the anchor tag button targets -->
      <!-- This div will also be our transparent background overlay -->
    <div id="info" class="info_modal center">
      <!-- Pop up window in the overlay -->
      <div>
        <a href="#close" class="close">X</a>
        <!-- Whatever content you wish -->
        <h1>Hello Modal 1</h1>
        <p>This is our first CSS only modal</p>
      </div>
    </div>
    
    <!-- END NODAL 1 -->
    

    <!-- BEGIN MODAL 2 -->
    <!-- parent wrapper div with !D that the anchor tag button targets -->
      <!-- This div will also be our transparent background overlay -->
    <div id="info_2" class="info_modal center">
      <!-- Pop up window in the overlay -->
      <div>
        <a href="#close" class="close">X</a>
        <!-- Whatever content you wish -->
        <h1>Hello Modal 2</h1>
        <p>This is our first CSS only modal</p>
      </div>
    </div>
    
    <!-- END MODAL 2 -->
  </body>
</html>
